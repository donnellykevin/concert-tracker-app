<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Concert Tracker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
    input, textarea, button { width: 100%; margin: 6px 0; padding: 10px; }
    .concert { border-bottom: 1px solid #ddd; padding: 10px 0; }
  </style>
</head>
<body>

<h1>🎵 Concert Tracker</h1>

<input id="artist" placeholder="Artist/Band">
<input id="venue" placeholder="Venue">
<input id="city" placeholder="City">
<input id="date" type="date">
<input id="rating" type="number" placeholder="Rating (1-5)">
<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="addConcert()">Add Concert</button>

<h2>My Concerts</h2>
<div id="list"></div>

<script src="app.js"></script>
</body>
</html>
